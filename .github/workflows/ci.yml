# .github/workflows/ci.yml
# Runs on every push to main and every PR targeting main.
# Unit tests (Vitest) run first — fast, no external deps.
# E2E tests (Playwright) run against staging — never production.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests ────────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    env:
      # Public vars needed for Next.js build — not sensitive
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ── Build check ───────────────────────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: unit # only build if unit tests pass

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${{ secrets.NEXT_PUBLIC_SUPPORT_EMAIL }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── E2E tests ─────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build # only run E2E if build passes

    env:
      # Staging environment — never production
      STAGING_URL: ${{ secrets.STAGING_URL }}
      STAGING_TEST_TRAINEE_EMAIL: ${{ secrets.STAGING_TEST_TRAINEE_EMAIL }}
      STAGING_TEST_TRAINEE_PASSWORD: ${{ secrets.STAGING_TEST_TRAINEE_PASSWORD }}
      STAGING_TEST_INSTRUCTOR_EMAIL: ${{ secrets.STAGING_TEST_INSTRUCTOR_EMAIL }}
      STAGING_TEST_INSTRUCTOR_PASSWORD: ${{ secrets.STAGING_TEST_INSTRUCTOR_PASSWORD }}
      STAGING_TEST_COMMITTEE_EMAIL: ${{ secrets.STAGING_TEST_COMMITTEE_EMAIL }}
      STAGING_TEST_COMMITTEE_PASSWORD: ${{ secrets.STAGING_TEST_COMMITTEE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always() # upload report even if tests fail
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
